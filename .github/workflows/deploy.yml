name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub runner's public IP
        id: runner_ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Open temporary SSH firewall rule for this runner
        run: |
          gcloud compute firewall-rules create allow-ssh-from-ci-temp \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --network=portfolio-vpc \
            --direction=INGRESS \
            --action=ALLOW \
            --rules=tcp:22 \
            --source-ranges=${{ steps.runner_ip.outputs.ip }}/32 \
            --target-tags=portfolio-vm \
            --quiet || \
          gcloud compute firewall-rules update allow-ssh-from-ci-temp \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --source-ranges=${{ steps.runner_ip.outputs.ip }}/32 \
            --quiet

      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            cd ~/portfolio
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" > .env
            docker compose pull
            docker compose up -d

      - name: Close temporary SSH firewall rule
        if: always()
        run: |
          gcloud compute firewall-rules delete allow-ssh-from-ci-temp \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet
