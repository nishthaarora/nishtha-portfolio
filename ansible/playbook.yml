- name: Configure portfolio VM
  hosts: portfolio
  become: true

  vars:
    site_domain: "nishthaarora.duckdns.org"
    duckdns_subdomain: "nishthaarora"
    duckdns_token: "{{ lookup('env', 'DUCKDNS_TOKEN') }}"

  tasks:
    - name: Install Docker
      import_tasks: tasks/docker.yml

    - name: Install Nginx
      import_tasks: tasks/nginx.yml

    - name: Install Certbot
      import_tasks: tasks/certbot.yml

    - name: Configure DuckDNS auto-update
      import_tasks: tasks/duckdns.yml

    - name: Apply security hardening
      import_tasks: tasks/hardening.yml

  handlers:
    - name: Restart sshd
      systemd:
        name: ssh
        state: restarted

    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded
