- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure Nginx is running and enabled
  systemd:
    name: nginx
    state: started
    enabled: true

- name: Configure the request-rate-limit zones (must live in the http context)
  copy:
    dest: /etc/nginx/conf.d/rate-limit.conf
    content: |
      limit_req_zone $binary_remote_addr zone=portfolio_limit:10m rate=10r/s;
      limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=6r/m;
  notify: Reload nginx

- name: Check whether a Let's Encrypt certificate already exists for this domain
  stat:
    path: "/etc/letsencrypt/live/{{ site_domain }}/fullchain.pem"
  register: cert_exists

- name: Configure Nginx as a reverse proxy to the app container (HTTPS-aware)
  template:
    src: templates/portfolio.conf.j2
    dest: /etc/nginx/sites-available/portfolio
  vars:
    letsencrypt_dir: "/etc/letsencrypt/live/{{ site_domain }}"
  notify: Reload nginx

- name: Enable the portfolio site
  file:
    src: /etc/nginx/sites-available/portfolio
    dest: /etc/nginx/sites-enabled/portfolio
    state: link
  notify: Reload nginx

- name: Disable the default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx
